<body><div id="app"></div>
<script>
'use strict';
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>[...r.querySelectorAll(s)];
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const scenarios={1:'URA Finals',2:'Unity Cup',3:'Make a New Track',4:'Trackblazer'};
const chars={1001:'Special Week',1002:'Silence Suzuka',1003:'Tokai Teio',1004:'Maruzensky',1005:'Fuji Kiseki',1006:'Oguri Cap',1007:'Gold Ship',1008:'Vodka',1009:'Daiwa Scarlet',1010:'Taiki Shuttle',1011:'Grass Wonder',1013:'Mejiro McQueen',1014:'El Condor Pasa',1015:'TM Opera O',1016:'Narita Brian',1017:'Symboli Rudolf',1018:'Air Groove',1019:'Agnes Digital',1020:'Seiun Sky',1021:'Tamamo Cross',1022:'Fine Motion',1023:'Biwa Hayahide',1024:'Mayano Top Gun',1026:'Mihono Bourbon',1027:'Mejiro Ryan',1030:'Rice Shower',1032:'Agnes Tachyon',1035:'Winning Ticket',1038:'Curren Chan',1041:'Sakura Bakushin O',1045:'Super Creek',1046:'Smart Falcon',1050:'Narita Taishin',1051:'Nishino Flower',1052:'Haru Urara',1056:'Matikanefukukitaru',1058:'Meisho Doto',1059:'Mejiro Dober',1060:'Nice Nature',1061:'King Halo',1062:'Matikanetannhauser',1068:'Kitasan Black'};
const factorNames={10:'Speed',20:'Stamina',30:'Power',40:'Guts',50:'Wit',110:'Turf',120:'Dirt',210:'Front Runner',220:'Pace Chaser',230:'Late Surger',240:'End Closer',310:'Sprint',320:'Mile',330:'Medium',340:'Long',300010:'URA Finals',300020:'Unity Cup',300030:'Trackblazer'};
const profiles={
 'universal-parent':{label:'Universal direct parent',role:'parent',distance:'universal',strategy:'universal',w:[23,35,9,15,13,5]},
 'universal-grandparent':{label:'Universal grandparent',role:'grandparent',distance:'universal',strategy:'universal',w:[23,48,8,7,9,5]},
 'pace-parent':{label:'Pace Chaser parent',role:'parent',distance:'universal',strategy:'pace',w:[21,37,13,14,11,4]},
 'sprint-mile':{label:'Sprint / Mile parent',role:'parent',distance:'mile',strategy:'pace',w:[19,35,19,12,11,4]},
 'medium-pace':{label:'Medium Pace parent',role:'parent',distance:'medium',strategy:'pace',w:[22,37,14,14,9,4]},
 'long-parent':{label:'Long-distance parent',role:'parent',distance:'long',strategy:'universal',w:[24,36,15,13,8,4]},
 'white-first':{label:'White-spark donor',role:'grandparent',distance:'universal',strategy:'universal',w:[10,68,5,5,5,7]},
 'blue-first':{label:'Blue-first comparison',role:'parent',distance:'universal',strategy:'universal',w:[61,17,8,5,5,4]}
};
let state={v:[],name:'',tab:'overview',profile:'universal-parent',target:0,resources:false,aff:null};
const cardBase=id=>Math.floor(Number(id)/100), cName=id=>chars[cardBase(id)]||`Chara ${cardBase(id)}`;
function cat(id){if([10,20,30,40,50,60].includes(id))return'blue';if([110,120,210,220,230,240,310,320,330,340].includes(id))return'pink';if(id>=100000&&id<200000)return'race';if(id>=200000&&id<300000)return'skill';if(id>=300000&&id<1000000)return'scenario';if(id>=1000000)return'green';return'other'}
function factors(o){const a=o.factor_info_array||o.factor_id_array||[];return a.map(x=>Number(x.factor_id??x)).filter(Number.isFinite).map(raw=>{const id=Math.floor(raw/10),stars=raw%10;return{raw,id,stars,cat:cat(id),name:factorNames[id]||`Factor ${id}`}})}
function metrics(fs){const m={blue:0,guts:0,pink:0,white:0,whiteStars:0,distinct:0,scenario:0,skill:0,race:0,blueQ:0,pinkQ:0,whiteQ:0},d=new Set;for(const f of fs){const sv={1:.28,2:.66,3:1}[f.stars]||f.stars/3;if(f.cat==='blue'){m.blue+=f.stars;m.blueQ+=({10:1,20:.82,30:.97,40:.45,50:.82}[f.id]||.5)*sv;if(f.id===40)m.guts+=f.stars}else if(f.cat==='pink'){m.pink+=f.stars;m.pinkQ+=({110:.75,120:.3,210:.45,220:.8,230:.7,240:.65,310:.7,320:.78,330:.82,340:.7}[f.id]||.5)*sv}else if(['skill','race','scenario'].includes(f.cat)){m.white++;m.whiteStars+=f.stars;d.add(f.id);let w=f.cat==='scenario'?1.8:f.cat==='skill'?1:.48;m.whiteQ+=w*(.55+.45*f.stars/3);m[f.cat]++}}m.distinct=d.size;m.whiteQ+=d.size*.22;return m}
function parse(data){if(!Array.isArray(data)||!data.length)throw Error('Expected a non-empty top-level JSON array from UmaExtractor.');return data.map((r,i)=>{if(!r.trained_chara_id||!r.card_id||!Array.isArray(r.succession_chara_array))throw Error(`Invalid record ${i+1}`);const map=Object.fromEntries(r.succession_chara_array.map(n=>[Number(n.position_id),n]));for(const p of[10,20,11,12,21,22])if(!map[p])throw Error(`Veteran ${r.trained_chara_id} is missing lineage position ${p}`);const own=factors(r),line={};for(const p of[10,20,11,12,21,22]){const n=map[p];line[p]={card:Number(n.card_id),base:cardBase(n.card_id),name:cName(n.card_id),f:factors(n),wins:(n.win_saddle_id_array||[]).map(Number)}}const active=[...own,...line[10].f,...line[20].f],full=[...own,...[10,20,11,12,21,22].flatMap(p=>line[p].f)],wins=(r.win_saddle_id_array||[]).map(Number),set=new Set(wins),ol=line[10].wins.filter(x=>set.has(x)).length,or=line[20].wins.filter(x=>set.has(x)).length;return{raw:r,id:Number(r.trained_chara_id),card:Number(r.card_id),base:cardBase(r.card_id),name:cName(r.card_id),scenario:scenarios[Number(r.scenario_id)]||`Scenario ${r.scenario_id||0}`,date:String(r.register_time||r.create_time||'').slice(0,10),rank:Number(r.rank_score||0),stats:[r.speed||0,r.stamina||0,r.power||0,r.guts||0,r.wiz||0],own,active,full,line,wins,om:metrics(own),am:metrics(active),fm:metrics(full),blue:own.find(f=>f.cat==='blue'),pink:own.find(f=>f.cat==='pink'),ol,or,g1:3*(ol+or)}})}
function percentile(a){const s=a.map((v,i)=>({v,i})).sort((x,y)=>x.v-y.v),r=Array(a.length);let p=0;while(p<s.length){let e=p+1;while(e<s.length&&s[e].v===s[p].v)e++;const q=(((p+1)+e)/2)/s.length;for(let k=p;k<e;k++)r[s[k].i]=q;p=e}return r}
function aff2(a,b){if(!state.aff)return 0;const d=state.aff,n=d.chars.length,i=d.idx.get(a),j=d.idx.get(b);return i==null||j==null?0:d.aff2[i*n+j]||0}
function aff3(a,b,c){if(!state.aff)return 0;const d=state.aff,n=d.chars.length,i=d.idx.get(a),j=d.idx.get(b),k=d.idx.get(c);return i==null||j==null||k==null?0:d.aff3[i*n*n+j*n+k]||0}
function lineAffinity(v,target){return target&&state.aff?aff2(target,v.base)+aff3(target,v.base,v.line[10].base)+aff3(target,v.base,v.line[20].base)+v.g1:v.g1}
function relevant(f,p){let x=1,t=f.name.toLowerCase();if(f.cat==='skill'){if(t.includes('racing spirit')||t.includes('ignited spirit')||t.includes('uma stan'))x+=.35;if(p.strategy!=='universal'&&t.includes(p.strategy))x+=.5;if(p.distance!=='universal'&&t.includes(p.distance))x+=.5}return x}
function rank(profileId=state.profile,target=state.target){const p=profiles[profileId],fs=state.v.map(v=>p.role==='grandparent'?v.own:v.active),raw=state.v.map((v,i)=>{let b=0,pi=0,w=0,d=new Set;for(const f of fs[i]){const sv={1:.28,2:.66,3:1}[f.stars]||f.stars/3;if(f.cat==='blue'){let z={10:1,20:.82,30:.97,40:.45,50:.82}[f.id]||.5;if(p.distance==='long'&&f.id===20)z+=.22;b+=z*sv}else if(f.cat==='pink'){let z={110:.75,120:.3,210:.45,220:.8,230:.7,240:.65,310:.7,320:.78,330:.82,340:.7}[f.id]||.5;const did={sprint:310,mile:320,medium:330,long:340}[p.distance],sid={front:210,pace:220,late:230,end:240}[p.strategy];if(f.id===did||f.id===sid)z+=.65;pi+=z*sv}else if(['skill','race','scenario'].includes(f.cat)){d.add(f.id);w+=(f.cat==='scenario'?1.8:f.cat==='skill'?1:.48)*relevant(f,p)*(.55+.45*f.stars/3)}}w+=d.size*.22;return[b,w,pi,lineAffinity(v,target),({100101:1,100601:1,105101:.95,101001:.8,101401:.78,101101:.7,102701:.68,102101:.62,101701:.58,104101:.55,103201:.48,100602:.45,100701:.42}[v.card]||.4),d.size/Math.sqrt(Math.max(1,fs[i].length))]});const cols=[0,1,2,3,4,5].map(c=>percentile(raw.map(x=>x[c]))),sum=p.w.reduce((a,b)=>a+b,0);return state.v.map((v,i)=>{const comp=cols.map(c=>c[i]),score=100*comp.reduce((s,x,k)=>s+x*p.w[k]/sum,0),strengths=[],weak=[];const m=p.role==='grandparent'?v.om:v.am;if(v.blue?.stars===3&&v.blue.id!==40)strengths.push(`${v.blue.name} 3★ on veteran`);if(m.blue>=9)strengths.push('9★ blue line');if((p.role==='grandparent'?v.om.white:v.am.white)>=10)strengths.push(`${p.role==='grandparent'?v.om.white:v.am.white} white factors`);if(v.g1>=135)strengths.push(`G1 score ${v.g1}`);if(v.blue?.stars===1)weak.push(`Only ${v.blue.name} 1★`);if(v.blue?.id===40)weak.push('Main blue is Guts');return{v,score,comp,raw:raw[i],strengths,weak,aff:target?lineAffinity(v,target):null}}).sort((a,b)=>b.score-a.score)}
const fl=f=>f?`${f.name} ${f.stars}★`:'—';
function chips(fs,lim=40){return fs.slice().sort((a,b)=>a.cat.localeCompare(b.cat)||b.stars-a.stars).slice(0,lim).map(f=>`<span class="factor factor-${f.cat}" title="Factor ${f.id}">${esc(f.name)} <b>${f.stars}★</b></span>`).join('')+(fs.length>lim?`<span class="factor">+${fs.length-lim}</span>`:'')}
function shell(){app.innerHTML=`<header class="topbar"><a class="brand" href="#overview"><span class="brand-mark">U</span><span><strong>Uma Veterans Explorer</strong><small>Inheritance analytics lab</small></span></a><nav class="tabs">${['overview','explorer','rankings','pairs'].map(t=>`<a class="tab ${state.tab===t?'active':''}" href="#${t}">${t==='pairs'?'Pair Builder':t[0].toUpperCase()+t.slice(1)}</a>`).join('')}</nav><div class="top-actions"><span id="rs" class="status-pill">Loading uma.moe…</span><label class="button button-primary file-button">Import data.json<input id="file" type="file" accept=".json,application/json" hidden></label></div></header><main><section id="drop" class="drop-zone ${state.v.length?'drop-zone-compact':''}"><div><strong>${state.v.length?`${state.v.length} veterans loaded from ${esc(state.name)}`:'Drop an UmaExtractor data.json here'}</strong><span>${state.v.length?'Import another dump to replace the collection.':'Processed only in your browser; never uploaded.'}</span></div><label class="button file-button">Choose file<input id="file2" type="file" accept=".json,application/json" hidden></label></section><section id="view"></section></main><dialog id="dlg" class="dialog"><div class="dialog-header"><div><h2 id="dt"></h2><p id="ds"></p></div><button id="dc" class="icon-button">×</button></div><div id="db" class="dialog-content"></div></dialog><div id="toast" class="toast"></div>`;for(const id of['file','file2'])$('#'+id).onchange=e=>e.target.files[0]&&importFile(e.target.files[0]);const d=$('#drop');for(const n of['dragenter','dragover'])d.addEventListener(n,e=>{e.preventDefault();d.classList.add('dragging')});for(const n of['dragleave','drop'])d.addEventListener(n,e=>{e.preventDefault();d.classList.remove('dragging')});d.ondrop=e=>e.dataTransfer.files[0]&&importFile(e.dataTransfer.files[0]);$('#dc').onclick=()=>$('#dlg').close();resourceStatus();render()}
function toast(s,bad=false){const t=$('#toast');t.textContent=s;t.className=`toast visible ${bad?'toast-error':'toast-success'}`;setTimeout(()=>t.classList.remove('visible'),3500)}
async function importFile(f){try{toast(`Reading ${f.name}…`);state.v=parse(JSON.parse(await f.text()));state.name=f.name;state.tab='overview';location.hash='overview';shell();toast(`Loaded ${state.v.length} veterans.`)}catch(e){toast(e.message||String(e),true)}}
function resourceStatus(){const e=$('#rs');if(!e)return;e.textContent=state.resources?(state.aff?'uma.moe + affinity loaded':'uma.moe names loaded'):'Offline reference mode';e.className=`status-pill ${state.resources?'status-ok':'status-warn'}`}
function render(){if(!state.v.length)return empty();if(state.tab==='overview')overview();else if(state.tab==='explorer')explorer();else if(state.tab==='rankings')rankings();else pairs()}
function empty(){$('#view').innerHTML=`<section class="hero-grid"><article class="hero-card"><p class="eyebrow">Local-first analytics</p><h1>Find the veterans actually worth breeding forward.</h1><p>Raw factor exploration, role-aware rankings, G1 intersections, exact target affinity and pair recommendations in one static app.</p><div class="hero-points"><span>Nothing uploaded</span><span>No account required</span><span>GitHub Pages ready</span></div></article><article class="panel getting-started"><h2>Expected input</h2><ol><li>Generate <code>data.json</code> with <a href="https://github.com/xancia/UmaExtractor" target="_blank">UmaExtractor</a>.</li><li>Drop the file above.</li><li>Start with Raw Explorer, then compare rankings.</li></ol></article></section><section class="feature-grid"><article class="panel feature-card"><h3>Raw Explorer</h3><p>Sort by any factor, stars, scope and collection metric.</p></article><article class="panel feature-card"><h3>Role-aware scoring</h3><p>Grandparents use own factors; direct parents use the active three-uma line.</p></article><article class="panel feature-card"><h3>Pair Builder</h3><p>Search parent combinations for a chosen target character.</p></article></section>`}
function metric(v,l){return`<article class="metric-card"><strong>${esc(v)}</strong><span>${esc(l)}</span></article>`}
function overview(){const s={total:state.v.length,characters:new Set(state.v.map(v=>v.base)).size,nine:state.v.filter(v=>v.am.blue>=9).length,own10:state.v.filter(v=>v.om.white>=10).length,act25:state.v.filter(v=>v.am.white>=25).length,guts:state.v.filter(v=>v.blue?.id===40&&v.blue.stars===1).length},pr=rank('universal-parent').slice(0,6),gr=rank('universal-grandparent').slice(0,6),hidden=state.v.filter(v=>v.om.white>=10&&(v.blue?.stars||0)<=1).sort((a,b)=>b.om.whiteQ-a.om.whiteQ).slice(0,8),sc=[...new Set(state.v.map(v=>v.scenario))].map(x=>[x,state.v.filter(v=>v.scenario===x).length]).sort((a,b)=>b[1]-a[1]),mx=Math.max(...sc.map(x=>x[1]));$('#view').innerHTML=`<section class="page-heading"><div><p class="eyebrow">Collection health</p><h1>${esc(state.name)}</h1><p>Coverage and strongest assets under different breeding roles.</p></div></section><section class="metric-grid">${metric(s.total,'Veterans')}${metric(s.characters,'Characters')}${metric(s.nine,'9★ active blue lines')}${metric(s.own10,'10+ own whites')}${metric(s.act25,'25+ active whites')}${metric(s.guts,'1★ Guts mains')}</section><section class="dashboard-grid"><article class="panel span-7"><div class="panel-title"><div><h2>Best direct parents</h2><p>Veteran plus both direct parents.</p></div></div>${cards(pr)}</article><article class="panel span-5"><div class="panel-title"><div><h2>Scenario coverage</h2></div></div><div class="bar-chart">${sc.map(x=>`<div class="bar-row"><span>${esc(x[0])}</span><div><i style="width:${x[1]/mx*100}%"></i></div><b>${x[1]}</b></div>`).join('')}</div></article><article class="panel span-7"><div class="panel-title"><div><h2>Best grandparent donors</h2><p>Only the veteran's own factors.</p></div></div>${cards(gr)}</article><article class="panel span-5"><div class="panel-title"><div><h2>Hidden value</h2><p>White-rich veterans with weak main blue sparks.</p></div></div><div class="compact-list">${hidden.map(v=>`<button class="compact-row" data-id="${v.id}"><span><b>${esc(v.name)}</b><small>#${v.id} · ${esc(fl(v.blue))}</small></span><strong>${v.om.white} whites</strong></button>`).join('')}</div></article></section>`;bindOpen()}
function cards(r){return`<div class="rank-card-list">${r.map((x,i)=>`<button class="rank-card" data-id="${x.v.id}"><span class="rank-number">${i+1}</span><span class="rank-main"><b>${esc(x.v.name)}</b><small>#${x.v.id} · ${esc(fl(x.v.blue))} · ${x.v.om.white} own whites</small></span><strong>${x.score.toFixed(1)}</strong></button>`).join('')}</div>`}
let ex={q:'',scenario:'',scope:'own',factor:0,mode:'stars',sort:'id',dir:'desc',limit:100};
function allFactors(){const m=new Map;state.v.flatMap(v=>v.full).forEach(f=>m.set(f.id,f));return[...m.values()].sort((a,b)=>a.cat.localeCompare(b.cat)||a.name.localeCompare(b.name))}
function explorer(){const fs=allFactors(),sc=[...new Set(state.v.map(v=>v.scenario))].sort();$('#view').innerHTML=`<section class="page-heading"><div><p class="eyebrow">Raw data</p><h1>Veteran Explorer</h1><p>No composite score. Select any field or factor and sort directly.</p></div></section><section class="panel filters"><label>Search<input id="eq" value="${esc(ex.q)}" placeholder="Name, ID or factor"></label><label>Scenario<select id="es"><option value="">All</option>${sc.map(x=>`<option ${x===ex.scenario?'selected':''}>${esc(x)}</option>`).join('')}</select></label><label>Scope<select id="ec"><option value="own">Own</option><option value="active" ${ex.scope==='active'?'selected':''}>Active line</option><option value="full" ${ex.scope==='full'?'selected':''}>Full lineage</option></select></label><label>Factor<select id="ef"><option value="0">None</option>${fs.map(f=>`<option value="${f.id}" ${f.id===ex.factor?'selected':''}>${esc(f.name)} [${f.id}]</option>`).join('')}</select></label><label>Metric<select id="em"><option value="stars">Total stars</option><option value="count" ${ex.mode==='count'?'selected':''}>Copies</option></select></label><label>Sort<select id="eo">${[['id','Veteran ID'],['name','Name'],['main','Main blue stars'],['ownW','Own white count'],['activeB','Active blue stars'],['activeW','Active white count'],['g1','G1 score'],['factor','Selected factor']].map(x=>`<option value="${x[0]}" ${ex.sort===x[0]?'selected':''}>${x[1]}</option>`).join('')}</select></label><label>Order<select id="ed"><option value="desc">Descending</option><option value="asc" ${ex.dir==='asc'?'selected':''}>Ascending</option></select></label><label>Rows<select id="el">${[50,100,250,1000].map(x=>`<option ${x===ex.limit?'selected':''}>${x}</option>`).join('')}</select></label></section><section class="panel table-panel"><div id="sum" class="table-summary"></div><div class="table-scroll"><table><thead><tr><th>Veteran</th><th>Scenario</th><th>Main blue</th><th>Main pink</th><th>Own whites</th><th>Active blue</th><th>Active whites</th><th>G1 score</th><th>Selected factor</th><th>Stats</th></tr></thead><tbody id="body"></tbody></table></div></section>`;const bind=(id,key,ev='change')=>$('#'+id).addEventListener(ev,e=>{ex[key]=['factor','limit'].includes(key)?Number(e.target.value):e.target.value;updateExplorer()});bind('eq','q','input');bind('es','scenario');bind('ec','scope');bind('ef','factor');bind('em','mode');bind('eo','sort');bind('ed','dir');bind('el','limit');updateExplorer()}
function fmetric(v){const fs=v[ex.scope].filter(f=>f.id===ex.factor);return ex.mode==='count'?fs.length:fs.reduce((s,f)=>s+f.stars,0)}
function explorerRows(){const q=ex.q.toLowerCase();let r=state.v.filter(v=>(!ex.scenario||v.scenario===ex.scenario)&&(!q||[v.name,v.id,v.card,...v.full.flatMap(f=>[f.name,f.id])].join(' ').toLowerCase().includes(q))),val=v=>({id:v.id,name:v.name,main:v.blue?.stars||0,ownW:v.om.white,activeB:v.am.blue,activeW:v.am.white,g1:v.g1,factor:fmetric(v)}[ex.sort]);r.sort((a,b)=>{const x=val(a),y=val(b),d=ex.dir==='asc'?1:-1;return typeof x==='string'?d*x.localeCompare(y):d*(x-y)});return r}
function updateExplorer(){const r=explorerRows(),v=r.slice(0,ex.limit);$('#sum').textContent=`${r.length} matching veterans · showing ${v.length}`;$('#body').innerHTML=v.map(x=>`<tr data-id="${x.id}"><td><b>${esc(x.name)}</b><small>#${x.id} · card ${x.card}</small></td><td>${esc(x.scenario)}<small>${x.date}</small></td><td>${esc(fl(x.blue))}</td><td>${esc(fl(x.pink))}</td><td><b>${x.om.white}</b><small>${x.om.whiteStars}★ · ${x.om.distinct} distinct</small></td><td><b>${x.am.blue}★</b><small>Guts ${x.am.guts}★</small></td><td><b>${x.am.white}</b><small>${x.am.whiteStars}★</small></td><td><b>${x.g1}</b><small>${x.ol}+${x.or} overlaps</small></td><td><b>${fmetric(x)}</b></td><td>${x.stats.join('/')}</td></tr>`).join('');bindOpen()}
function charOptions(sel){const ids=[...new Set(state.v.flatMap(v=>[v.base,...Object.values(v.line).map(n=>n.base)]))].sort((a,b)=>(chars[a]||'').localeCompare(chars[b]||''));return ids.map(id=>`<option value="${id}" ${id===sel?'selected':''}>${esc(chars[id]||`Chara ${id}`)} (${id})</option>`).join('')}
function rankings(){const p=profiles[state.profile];$('#view').innerHTML=`<section class="page-heading"><div><p class="eyebrow">Role-aware scoring</p><h1>Rankings</h1><p>Collection-relative percentiles with visible components.</p></div></section><section class="panel ranking-controls"><label>Preset<select id="rp">${Object.entries(profiles).map(([id,x])=>`<option value="${id}" ${id===state.profile?'selected':''}>${esc(x.label)}</option>`).join('')}</select></label><label>Target<select id="rt"><option value="0">No target affinity</option>${charOptions(state.target)}</select></label><p class="control-description">Grandparent profiles use own factors; direct-parent profiles use the active three-uma line.</p></section><section class="panel table-panel"><div id="rsum" class="table-summary"></div><div class="table-scroll"><table><thead><tr><th>#</th><th>Veteran</th><th>Score</th><th>Blue</th><th>White</th><th>Pink</th><th>Affinity / G1</th><th>Own factors</th><th>Active line</th><th>Why</th></tr></thead><tbody id="rbody"></tbody></table></div></section>`;$('#rp').onchange=e=>{state.profile=e.target.value;rankings()};$('#rt').onchange=e=>{state.target=Number(e.target.value);updateRank()};updateRank()}
function bar(x){return`<div class="component-bar"><i style="width:${Math.round(x*100)}%"></i><span>${Math.round(x*100)}</span></div>`}
function updateRank(){const r=rank();$('#rsum').innerHTML=`${r.length} veterans ranked with <b>${esc(profiles[state.profile].label)}</b>${state.target?` for <b>${esc(chars[state.target]||state.target)}</b>`:''}`;$('#rbody').innerHTML=r.slice(0,250).map((x,i)=>`<tr data-id="${x.v.id}"><td class="rank-index">${i+1}</td><td><b>${esc(x.v.name)}</b><small>#${x.v.id} · ${esc(x.v.scenario)}</small></td><td><strong class="score-value">${x.score.toFixed(1)}</strong><small>${esc(x.weak[0]||'No major warning')}</small></td><td>${bar(x.comp[0])}<small>raw ${x.raw[0].toFixed(2)}</small></td><td>${bar(x.comp[1])}<small>raw ${x.raw[1].toFixed(2)}</small></td><td>${bar(x.comp[2])}<small>raw ${x.raw[2].toFixed(2)}</small></td><td><b>${x.aff??x.v.g1}</b></td><td>${esc(fl(x.v.blue))}<small>${x.v.om.white} whites</small></td><td>${x.v.am.blue}★ blue<small>${x.v.am.white} whites</small></td><td>${esc(x.strengths.slice(0,2).join(' · ')||'Balanced line')}</td></tr>`).join('');bindOpen()}
function pairs(){if(!profiles[state.profile]||profiles[state.profile].role==='grandparent')state.profile='pace-parent';$('#view').innerHTML=`<section class="page-heading"><div><p class="eyebrow">Breeding search</p><h1>Pair Builder</h1><p>Transparent pair heuristic using parent quality, affinity, G1 wins and factor coverage.</p></div></section><section class="panel pair-controls"><label>Target<select id="pt"><option value="0">Choose target…</option>${charOptions(state.target)}</select></label><label>Profile<select id="pp">${Object.entries(profiles).filter(x=>x[1].role!=='grandparent').map(([id,x])=>`<option value="${id}" ${id===state.profile?'selected':''}>${esc(x.label)}</option>`).join('')}</select></label><div class="pair-status ${state.aff?'status-good':'status-warning'}">${state.aff?'Exact aff2/aff3 loaded.':'G1-only fallback until affinity data loads.'}</div></section><section id="pres"></section>`;$('#pt').onchange=e=>{state.target=Number(e.target.value);updatePairs()};$('#pp').onchange=e=>{state.profile=e.target.value;updatePairs()};updatePairs()}
function coverage(a,b){return new Set([...a.active,...b.active].filter(f=>['scenario','skill','pink'].includes(f.cat)).map(f=>f.id)).size}
function updatePairs(){const c=$('#pres');if(!state.target){c.innerHTML='<section class="panel empty-state"><h2>Select the target character</h2><p>The target and duplicate character identities are excluded from parent slots.</p></section>';return}const r=rank().slice(0,50),out=[];for(let i=0;i<r.length;i++)for(let j=i+1;j<r.length;j++){const a=r[i],b=r[j];if(a.v.base===b.v.base||a.v.base===state.target||b.v.base===state.target)continue;const shared=a.v.wins.filter(x=>b.v.wins.includes(x)).length,sy=aff2(a.v.base,b.v.base)+shared*3,af=lineAffinity(a.v,state.target)+lineAffinity(b.v,state.target)+sy,cov=coverage(a.v,b.v),score=.54*((a.score+b.score)/2)+.3*Math.min(100,af/2.4)+.1*Math.min(100,cov*6)+.06*Math.min(100,sy*1.8);out.push({a,b,shared,sy,af,cov,score})}out.sort((a,b)=>b.score-a.score);c.innerHTML=`<section class="pair-grid">${out.slice(0,50).map((x,i)=>`<article class="panel pair-card"><div class="pair-rank"><span>#${i+1}</span><strong>${x.score.toFixed(1)}</strong></div><div class="pair-parents">${parent(x.a,'Parent A')}<div class="pair-plus">+</div>${parent(x.b,'Parent B')}</div><div class="pair-metrics"><span><b>${x.af}</b>affinity package</span><span><b>${x.sy}</b>parent synergy</span><span><b>${x.cov}</b>factor coverage</span><span><b>${x.shared}</b>shared G1 wins</span></div></article>`).join('')}</section>`;bindOpen()}
function parent(x,l){return`<button class="pair-parent" data-id="${x.v.id}"><small>${l}</small><b>${esc(x.v.name)}</b><span>#${x.v.id} · score ${x.score.toFixed(1)}</span><span>${esc(fl(x.v.blue))} · ${x.v.am.white} active whites</span></button>`}
function bindOpen(){$$('[data-id]').forEach(e=>e.onclick=()=>openVet(Number(e.dataset.id)))}
function openVet(id){const v=state.v.find(x=>x.id===id);if(!v)return;$('#dt').textContent=`${v.name} · #${v.id}`;$('#ds').textContent=`${v.scenario} · ${v.date} · card ${v.card}`;$('#db').innerHTML=`<section class="dialog-metrics">${metric(fl(v.blue),'Main blue')}${metric(fl(v.pink),'Main pink')}${metric(v.om.white,'Own whites')}${metric(v.am.white,'Active whites')}${metric(v.am.blue+'★','Active blue')}${metric(v.g1,'G1 score')}</section><section><h3>Own factors <small>Used as a grandparent</small></h3><div class="factor-cloud">${chips(v.own,100)}</div></section><section><h3>Active parent line</h3><div class="lineage-grid three"><article class="lineage-node main-node"><b>${esc(v.name)}</b><div class="factor-cloud">${chips(v.own)}</div></article>${node(v,10,'Left parent')}${node(v,20,'Right parent')}</div></section><section><h3>Grandparents</h3><div class="lineage-grid four">${node(v,11,'L-L')}${node(v,12,'L-R')}${node(v,21,'R-L')}${node(v,22,'R-R')}</div></section><details><summary>Raw JSON</summary><pre>${esc(JSON.stringify(v.raw,null,2))}</pre></details>`;$('#dlg').showModal()}
function node(v,p,l){const n=v.line[p];return`<article class="lineage-node"><small>${l}</small><b>${esc(n.name)}</b><span>card ${n.card}</span><div class="factor-cloud">${chips(n.f)}</div></article>`}
window.onhashchange=()=>{const t=location.hash.slice(1);if(['overview','explorer','rankings','pairs'].includes(t))state.tab=t;render();$$('.tab').forEach(x=>x.classList.toggle('active',x.getAttribute('href')==='#'+state.tab))};
async function resources(){try{const [f,c,a]=await Promise.all(['factors.json','character_names.json','affinity.json'].map(x=>fetch(`https://uma.moe/resources/current/${x}`).then(r=>r.ok?r.json():Promise.reject(r.status))));for(const x of(Array.isArray(f)?f:f.items||[])){const id=Number(x.id||x.factor_id),n=x.text||x.name;if(id&&n)factorNames[id]=n}if(Array.isArray(c))for(const x of c){const id=Math.floor(Number(x.chara_id||x.id)/(Number(x.chara_id||x.id)>=10000?100:1));if(id&&x.name)chars[id]=x.name}else if(c&&typeof c==='object')for(const[k,x]of Object.entries(c)){const id=Math.floor(Number(k)/(Number(k)>=10000?100:1)),n=typeof x==='string'?x:x.name;if(id&&n)chars[id]=n}if(a?.chars&&a?.aff2&&a?.aff3)state.aff={...a,idx:new Map(a.chars.map((x,i)=>[Number(x),i]))};state.resources=true;if(state.v.length)state.v=parse(state.v.map(x=>x.raw))}catch(e){console.warn('Reference data unavailable',e)}resourceStatus();render()}
const app=$('#app');state.tab=location.hash.slice(1)||'overview';shell();resources();
</script></body></html>
